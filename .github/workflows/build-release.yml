name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: auto-enter-win.exe
            asset_name: auto-enter-win.exe
          - os: macos-latest
            artifact_name: auto-enter-mac
            asset_name: auto-enter-mac
          - os: ubuntu-latest
            artifact_name: auto-enter-linux
            asset_name: auto-enter-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # 🟢 確保使用當前環境的 pip
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            echo "[*] 正在為 macOS 下載現代通用架構的 Pillow..."
            mkdir -p temp_wheel
            python -m pip download --only-binary=:all: --platform macosx_10_13_universal2 --dest temp_wheel Pillow
            
            WHEEL_FILE=$(ls temp_wheel/Pillow-*.whl)
            SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
            unzip -o "$WHEEL_FILE" -d "$SITE_PACKAGES"
            rm -rf temp_wheel
            
            python -m pip install pyautogui
          else
            python -m pip install pyautogui
          fi
        shell: bash

      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xdotool python3-tk python3-dev

      - name: Build with PyInstaller
        run: |
          if [ "${{ matrix.os }}" != "macos-latest" ]; then
            # 🟢 Windows 和 Linux 也同步改成 python -m 啟動，確保環境一致
            python -m PyInstaller --onefile --name=${{ matrix.artifact_name }} timer_enter.py
          else
            # ✨ macOS 專屬：用確定的 Python 執行 PyInstaller，強制打包雙架構
            python -m PyInstaller --onefile --name=${{ matrix.artifact_name }} --target-arch=universal2 timer_enter.py
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/auto-enter-win.exe/auto-enter-win.exe
            artifacts/auto-enter-mac/auto-enter-mac
            artifacts/auto-enter-linux/auto-enter-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to NPM
    needs: release # ✨ 關鍵：確保 release 成功建立、二進位檔掛上去後才執行
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 順應最新 Runner 規範，直接用 Node 24

      # 同步 package.json 版號 (在此觸發條件下，github.ref_name 就是 v1.0.x)
      - name: Sync package.json version with Git Tag
        run: |
          npm version ${{ github.ref_name }} --no-git-tag-version
          echo "[*] package.json 版號已同步為: ${{ github.ref_name }}"

      # 動態將 Repo 與 Tag 版本注入 index.js
      - name: Inject Repo and Version into index.js
        run: |
          sed -i 's|__GITHUB_REPO__|${{ github.repository }}|g' index.js
          sed -i 's|__RELEASE_VERSION__|${{ github.ref_name }}|g' index.js
          echo "[*] 已將 index.js 中的 Repo 替換為: ${{ github.repository }}"
          echo "[*] 已將 index.js 中的 Version 替換為: ${{ github.ref_name }}"

      # 透過 Trusted Publishing 憑證推上 NPM
      - name: Publish Package to NPM
        run: npm publish --provenance