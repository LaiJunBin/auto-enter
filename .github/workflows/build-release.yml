name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: auto-enter-win.exe
            asset_name: auto-enter-win.exe
          - os: macos-latest
            artifact_name: auto-enter-mac
            asset_name: auto-enter-mac
          - os: ubuntu-latest
            artifact_name: auto-enter-linux
            asset_name: auto-enter-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyautogui pyinstaller

      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xdotool python3-tk python3-dev

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name=${{ matrix.artifact_name }} timer_enter.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/auto-enter-win.exe/auto-enter-win.exe
            artifacts/auto-enter-mac/auto-enter-mac
            artifacts/auto-enter-linux/auto-enter-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}