name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: auto-enter-win.exe
            asset_name: auto-enter-win.exe
          - os: ubuntu-latest
            artifact_name: auto-enter-linux
            asset_name: auto-enter-linux
            
          # 🍏 Mac 陣營拆分為二：
          # 1. 專門給 Apple Silicon (M系列晶片) 的編譯環境
          - os: macos-latest # 目前預設為 M 系列 arm64 Runner
            artifact_name: auto-enter-mac-arm64
            asset_name: auto-enter-mac-arm64
            
          # 2. 專門給舊款 Intel Mac 的編譯環境 (x64)
          # 🟢 修正：精確使用官方最新的 macos-15-intel 標籤
          - os: macos-15-intel 
            artifact_name: auto-enter-mac-x64
            asset_name: auto-enter-mac-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyautogui pyinstaller
        shell: bash

      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xdotool python3-tk python3-dev

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --onefile --name=${{ matrix.artifact_name }} timer_enter.py
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/auto-enter-win.exe/auto-enter-win.exe
            artifacts/auto-enter-mac-arm64/auto-enter-mac-arm64
            artifacts/auto-enter-mac-x64/auto-enter-mac-x64
            artifacts/auto-enter-linux/auto-enter-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to NPM
    needs: release # ✨ 關鍵：確保 release 成功建立、二進位檔掛上去後才執行
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 順應最新 Runner 規範，直接用 Node 24

      # 同步 package.json 版號 (在此觸發條件下，github.ref_name 就是 v1.0.x)
      - name: Sync package.json version with Git Tag
        run: |
          npm version ${{ github.ref_name }} --no-git-tag-version
          echo "[*] package.json 版號已同步為: ${{ github.ref_name }}"

      # 動態將 Repo 與 Tag 版本注入 index.js
      - name: Inject Repo and Version into index.js
        run: |
          sed -i 's|__GITHUB_REPO__|${{ github.repository }}|g' index.js
          sed -i 's|__RELEASE_VERSION__|${{ github.ref_name }}|g' index.js
          echo "[*] 已將 index.js 中的 Repo 替換為: ${{ github.repository }}"
          echo "[*] 已將 index.js 中的 Version 替換為: ${{ github.ref_name }}"

      # 透過 Trusted Publishing 憑證推上 NPM
      - name: Publish Package to NPM
        run: npm publish --provenance
