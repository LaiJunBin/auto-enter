name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: auto-enter-win.exe
            asset_name: auto-enter-win.exe
          - os: ubuntu-latest
            artifact_name: auto-enter-linux
            asset_name: auto-enter-linux
            
          # 🍏 Mac 陣營拆分為二：
          # 1. 專門給 Apple Silicon (M系列晶片) 的編譯環境 (ARM64)
          - os: macos-latest # 目前預設為 M 系列 arm64 Runner
            artifact_name: auto-enter-mac-arm64
            asset_name: auto-enter-mac-arm64
            
          # 2. 專門給舊款 Intel Mac 的編譯環境 (x64)
          - os: macos-15-intel 
            artifact_name: auto-enter-mac-x64
            asset_name: auto-enter-mac-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🟢 步驟 1：優先安裝基礎共用依賴
      - name: Install Base Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyautogui wheel setuptools
        shell: bash

      # 🍏 步驟 2 (macOS Intel 專屬)：遵循官方手冊，從原始碼現場編譯相容於 12.0 的 Bootloader
      # 透過 python3 waf 強制洗掉高版本環境的 _mkfifoat 符號污染
      - name: Build Clean PyInstaller Bootloader from Source (macOS Intel)
        if: matrix.os == 'macos-15-intel'
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          echo "[*] 正在從 PyPI 下載 PyInstaller 原始碼包..."
          python -m pip download --no-binary=:all: --no-deps pyinstaller
          tar -xf pyinstaller-*.tar.gz
          cd pyinstaller-*/
          
          echo "[*] 進入 bootloader 目錄，強制使用 12.0 目標進行本機編譯..."
          cd bootloader
          python3 waf distclean configure all
          
          echo "[*] 將重編完成的乾淨啟動器本地安裝進 Python 環境..."
          cd ..
          python3 -m pip install .
          
          cd ..
          rm -rf pyinstaller-*
        shell: bash

      # 🟢 步驟 3 (非 macOS Intel 平台)：直接極速安裝 PyInstaller 預建套件
      - name: Install Pre-built PyInstaller (Standard Platforms)
        if: matrix.os != 'macos-15-intel'
        run: |
          python -m pip install pyinstaller
        shell: bash

      # 🐧 步驟 4 (Linux 專屬)：安裝 GUI 虛擬化依賴
      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xdotool python3-tk python3-dev

      # 📦 步驟 5：執行 PyInstaller 打包
      - name: Build with PyInstaller
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          python -m PyInstaller --onefile --name=${{ matrix.artifact_name }} timer_enter.py
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/auto-enter-win.exe/auto-enter-win.exe
            artifacts/auto-enter-mac-arm64/auto-enter-mac-arm64
            artifacts/auto-enter-mac-x64/auto-enter-mac-x64
            artifacts/auto-enter-linux/auto-enter-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to NPM
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync package.json version with Git Tag
        run: |
          npm version ${{ github.ref_name }} --no-git-tag-version
          echo "[*] package.json 版號已同步為: ${{ github.ref_name }}"

      - name: Inject Repo and Version into index.js
        run: |
          sed -i 's|__GITHUB_REPO__|${{ github.repository }}|g' index.js
          sed -i 's|__RELEASE_VERSION__|${{ github.ref_name }}|g' index.js
          echo "[*] 已將 index.js 中的 Repo 替換為: ${{ github.repository }}"
          echo "[*] 已將 index.js 中的 Version 替換為: ${{ github.ref_name }}"

      - name: Publish Package to NPM
        run: npm publish --provenance
