name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: auto-enter-win.exe
            asset_name: auto-enter-win.exe
          - os: macos-latest
            artifact_name: auto-enter-mac
            asset_name: auto-enter-mac
          - os: ubuntu-latest
            artifact_name: auto-enter-linux
            asset_name: auto-enter-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          
          # 如果是 macOS，我們強制精確安裝支援雙架構的 Pillow 版本
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            # platform 指定 macosx_10_10_universal2 確保下載到 Fat Binary
            pip install --upgrade --only-binary=:all: --platform macosx_10_10_universal2 Pillow
          fi
          
          pip install pyautogui pyinstaller
        shell: bash

      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xdotool python3-tk python3-dev

      - name: Build with PyInstaller
        run: |
          # 如果是 Windows 或 Linux，維持原本的指令
          if [ "${{ matrix.os }}" != "macos-latest" ]; then
            pyinstaller --onefile --name=${{ matrix.artifact_name }} timer_enter.py
          else
            # ✨ macOS 專屬：強制 PyInstaller 打包 universal2 雙架構二進位檔
            pyinstaller --onefile --name=${{ matrix.artifact_name }} --target-arch=universal2 timer_enter.py
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/auto-enter-win.exe/auto-enter-win.exe
            artifacts/auto-enter-mac/auto-enter-mac
            artifacts/auto-enter-linux/auto-enter-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to NPM
    needs: release # ✨ 關鍵：確保 release 成功建立、二進位檔掛上去後才執行
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 順應最新 Runner 規範，直接用 Node 24

      # 同步 package.json 版號 (在此觸發條件下，github.ref_name 就是 v1.0.x)
      - name: Sync package.json version with Git Tag
        run: |
          npm version ${{ github.ref_name }} --no-git-tag-version
          echo "[*] package.json 版號已同步為: ${{ github.ref_name }}"

      # 動態將 Repo 與 Tag 版本注入 index.js
      - name: Inject Repo and Version into index.js
        run: |
          sed -i 's|__GITHUB_REPO__|${{ github.repository }}|g' index.js
          sed -i 's|__RELEASE_VERSION__|${{ github.ref_name }}|g' index.js
          echo "[*] 已將 index.js 中的 Repo 替換為: ${{ github.repository }}"
          echo "[*] 已將 index.js 中的 Version 替換為: ${{ github.ref_name }}"

      # 透過 Trusted Publishing 憑證推上 NPM
      - name: Publish Package to NPM
        run: npm publish --provenance